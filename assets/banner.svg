<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Shipwright — production engineering discipline for AI coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#141a28"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#1c2742" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0b0e14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <text x="64" y="118" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="30" fill="#22d3ee" letter-spacing="2">⚓  S H I P W R I G H T</text>
  <text x="60" y="196" font-family="system-ui,Segoe UI,Roboto,Arial" font-weight="800" font-size="60" fill="#e6e9f0">Ship like a <tspan fill="url(#grad)">senior engineer.</tspan></text>
  <text x="64" y="244" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="23" fill="#9aa4b8">5 skills that make AI agents plan, build, secure &amp; operate — never skip a step, never fake “done”.</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="16" fill="#cbd5e1">
    <rect x="64" y="280" width="250" height="40" rx="9" fill="#161b27" stroke="#232a3a"/>
    <text x="84" y="305">disciplined-delivery</text>
    <rect x="330" y="280" width="220" height="40" rx="9" fill="#161b27" stroke="#232a3a"/>
    <text x="350" y="305">securing-applications</text>
    <rect x="566" y="280" width="270" height="40" rx="9" fill="#161b27" stroke="#232a3a"/>
    <text x="586" y="305">operating-production-services</text>
  </g>
  <g font-family="system-ui,Segoe UI,Roboto,Arial">
    <rect x="980" y="56" width="236" height="120" rx="16" fill="#11151f" stroke="#232a3a"/>
    <text x="1098" y="104" font-size="44" fill="#34d399" text-anchor="middle" font-weight="800">MIT</text>
    <text x="1098" y="140" font-size="16" fill="#9aa4b8" text-anchor="middle">Claude · Codex · Gemini</text>
  </g>
</svg>
